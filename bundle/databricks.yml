# Declarative Automation Bundle configuration, more info here: https://docs.databricks.com/en/dev-tools/bundles/settings.html
bundle:
  name: "bundle"

include:
  - resources/*.yml
  - resources/*/*.yml

targets:
  # The 'dev' target, for development purposes. This target is the default.
  dev:
    mode: development
    default: true
    workspace:
      host: https://dbc-c7734eac-73e7.cloud.databricks.com

  # The 'prod' target, used for production deployment.
  prod:
    mode: development
    workspace:
      host: https://dbc-c7734eac-73e7.cloud.databricks.com
      # We always use /Users/cornachofrance@gmail.com for all resources to make sure we only have a single copy.
      root_path: /Users/cornachofrance@gmail.com/.bundle/${bundle.name}/${bundle.target}