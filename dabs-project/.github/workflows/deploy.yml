name: Deploy Databricks Bundle

on:
  push:
    branches:
      - main        # → prod
      - staging     # → staging
      - develop     # → dev
  pull_request:
    branches:
      - main
      - staging
  workflow_dispatch:
    inputs:
      target:
        description: "Deployment target"
        required: true
        default: dev
        type: choice
        options:
          - dev
          - staging
          - prod

env:
  DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
  DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}

jobs:
  # ─────────────────────────────────────────────
  # 1. Validate – runs on every PR and push
  # ─────────────────────────────────────────────
  validate:
    name: Validate Bundle
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install databricks-cli databricks-sdk
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi

      - name: Install Databricks CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh

      - name: Validate bundle (dev)
        run: databricks bundle validate -t dev

  # ─────────────────────────────────────────────
  # 2. Run unit tests
  # ─────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install test dependencies
        run: |
          pip install --upgrade pip pytest pyspark delta-spark
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi

      - name: Run tests
        run: pytest tests/ -v --tb=short

  # ─────────────────────────────────────────────
  # 3. Deploy to DEV  (branch: develop)
  # ─────────────────────────────────────────────
  deploy-dev:
    name: Deploy → dev
    runs-on: ubuntu-latest
    needs: [validate, test]
    if: |
      github.ref == 'refs/heads/develop' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'dev')
    environment: dev

    steps:
      - uses: actions/checkout@v4

      - name: Install Databricks CLI
        run: curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh

      - name: Deploy bundle to dev
        run: databricks bundle deploy -t dev

      - name: Run job (smoke test)
        run: databricks bundle run etl_pipeline_job -t dev --no-wait

  # ─────────────────────────────────────────────
  # 4. Deploy to STAGING  (branch: staging)
  # ─────────────────────────────────────────────
  deploy-staging:
    name: Deploy → staging
    runs-on: ubuntu-latest
    needs: [validate, test]
    if: |
      github.ref == 'refs/heads/staging' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'staging')
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - name: Install Databricks CLI
        run: curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh

      - name: Deploy bundle to staging
        run: databricks bundle deploy -t staging

  # ─────────────────────────────────────────────
  # 5. Deploy to PROD  (branch: main, manual approval)
  # ─────────────────────────────────────────────
  deploy-prod:
    name: Deploy → prod
    runs-on: ubuntu-latest
    needs: [validate, test]
    if: |
      github.ref == 'refs/heads/main' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'prod')
    environment: prod   # ← configure required reviewers in GitHub repo settings

    steps:
      - uses: actions/checkout@v4

      - name: Install Databricks CLI
        run: curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh

      - name: Deploy bundle to prod
        run: databricks bundle deploy -t prod

      - name: Summary
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Target:** prod" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Triggered by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
