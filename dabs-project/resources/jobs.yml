resources:
  jobs:
    etl_pipeline_job:
      name: ETL Pipeline - ${bundle.target}
      description: Main ETL pipeline job

      schedule:
        quartz_cron_expression: "0 0 6 * * ?"
        timezone_id: America/New_York
        pause_status: UNPAUSED

      email_notifications:
        on_failure:
          - alerts@mycompany.com

      tasks:
        - task_key: ingest_data
          description: Ingest raw data from source
          notebook_task:
            notebook_path: ${workspace.file_path}/src/notebooks/01_ingest_data
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
          new_cluster:
            spark_version: 15.4.x-scala2.12
            node_type_id: Standard_DS3_v2
            num_workers: 2
            spark_conf:
              spark.databricks.delta.preview.enabled: "true"

        - task_key: transform_data
          description: Apply transformations
          depends_on:
            - task_key: ingest_data
          notebook_task:
            notebook_path: ${workspace.file_path}/src/notebooks/02_transform_data
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
          job_cluster_key: shared_cluster

        - task_key: load_data
          description: Load into target tables
          depends_on:
            - task_key: transform_data
          notebook_task:
            notebook_path: ${workspace.file_path}/src/notebooks/03_load_data
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
          job_cluster_key: shared_cluster

      job_clusters:
        - job_cluster_key: shared_cluster
          new_cluster:
            spark_version: 15.4.x-scala2.12
            node_type_id: Standard_DS3_v2
            num_workers: 4

  pipelines:
    dlt_pipeline:
      name: DLT Pipeline - ${bundle.target}
      catalog: ${var.catalog}
      schema: ${var.schema}
      development: ${bundle.target == 'dev'}
      continuous: false
      channel: CURRENT

      libraries:
        - notebook:
            path: ${workspace.file_path}/src/notebooks/dlt_pipeline
